<!--
Questão 14 — Organizando uma página com títulos
Conteúdo trabalhado: hierarquia de títulos.
Crie uma página sobre uma escola. Use:
    <h1> para o nome da instituição;
    <h2> para o curso;
    <h3> para a disciplina.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Instituição Federal de Tecnologia </h1>
    <h2>Analise de Sistemas</h2>
    <h3>Disciplina: Tecnologia Web 1</h3>
</body>
</html>
