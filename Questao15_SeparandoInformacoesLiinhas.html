<!--
Questão 15 — Separando informações em linhas
Conteúdo trabalhado: uso da tag <br> para quebra de linha.
Crie uma página com nome, cidade e curso, cada informação em uma linha diferente.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Nome: João da Silva<br>
    Cidade: São Paulo<br>
    Curso: Ciência da Computação</p>
</body>
</html>
