<!--Questão 1 — Criando sua primeira página HTML
    Conteúdo trabalhado: estrutura básica do HTML: <!DOCTYPE html>, <html>,
    <head>, <title> e <body>.
    Crie uma página HTML completa. No título da aba do navegador, coloque Minha
    Primeira Página. No corpo da página, escreva a frase:
        Olá! Esta é minha primeira página HTML
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Primeira Página</title>
</head>
<body>
    Olá! Esta é minha primeira página HTML
</body>
</html>
