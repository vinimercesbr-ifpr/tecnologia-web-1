<!--
Questão 2 — Separando cabeça e corpo da página
    Conteúdo trabalhado: diferença entre <head> e <body>.
    Crie uma página HTML completa. No <head>, coloque o título Aula de HTML.
    No <body>, escreva duas frases sobre o que você está aprendendo.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de HTML</title>
</head>
<body>
    Estou aprendendo a criar páginas web.
    <br>
    HTML é usado para estruturar o conteúdo de uma página
</body>
</html>
