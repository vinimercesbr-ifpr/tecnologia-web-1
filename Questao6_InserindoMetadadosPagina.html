<!--
Questão 6 — Inserindo metadados da página
    Conteúdo trabalhado: uso de meta para descrição, palavras-chave e autor.
    Crie uma página HTML contendo os seguintes metadados:
    Descrição: Página de estudo sobre HTML básico
    Palavras-chave: HTML, Web, Programação
    Autor: Nome do Aluno
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página de estudo sobre HTML básico">
    <meta name="keywords" content="HTML, Web, Programação">
    <meta name="author" content="Vinícius Bruno">
    <title>Metadados em HTML</title>
</head>
<body>
    Está página possui metadados no cabeçalho
</body>
</html>
