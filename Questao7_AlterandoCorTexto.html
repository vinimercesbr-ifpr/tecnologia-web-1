<!--
Questão 7 — Alterando a cor do texto
    Conteúdo trabalhado: uso da tag <style> para aplicar CSS dentro do HTML.
    Crie uma página HTML em que todo o texto do corpo da página fique azul.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 7 — Alterando a cor do texto</title>
    <style>
        body{
            color: blue;
        }
    </style>
</head>
<body>
    Este texto será exibido na cor azul
</body>
</html>
