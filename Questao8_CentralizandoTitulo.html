<!--
Questão 8 — Centralizando um título
    Conteúdo trabalhado: uso de CSS interno para formatar uma tag HTML.
    Crie uma página com um título <h1> centralizado.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Título Centralizado</title>
    <style>
        /* CSS interno para centralizar o título */
        h1 {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Título Centralizado</h1>
</body>
</html>
