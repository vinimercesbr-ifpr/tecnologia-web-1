<!--
Questão 16 — Criando um endereço com quebras de linha
Conteúdo trabalhado: uso da tag <br> para quebra de linha.
Crie uma página com o endereço completo, cada parte em uma linha diferente.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 16 — Criando um endereço com quebras de linha</title>
</head>
<body>
    <h1>Endereço Completo</h1>
    <p>
        Rua das Flores, 123<br>
        Bairro Jardim<br>
        Cidade: São Paulo<br>
        Estado: SP<br>
        CEP: 01234-567
    </p>
</body>
</html>
